<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>光影對決｜戰鬥頁</title>
<style>
:root{--panel-bg:rgba(7,11,25,.84);--glow-O:0 0 30px #f6d26a;--glow-X:0 0 30px #9a7bff;--win-line-color:#ccff00;}
*{box-sizing:border-box} html,body{height:100%}
body{margin:0;padding:24px 0 0;min-height:100vh;color:white;font-family:"Microsoft JhengHei",sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:#050816;overflow:hidden;position:relative}
.bg-layer{position:fixed;inset:0;background:#050816 url('Gemini_Generated_Image_axefmzaxefmzaxef.jpg') center/cover no-repeat;filter:brightness(0.3);z-index:-2}
#topbar{width:min(1560px,95vw);display:flex;justify-content:space-between;gap:14px;margin:24px auto 10px}
.pill{background:rgba(7,12,26,.8);border:1px solid rgba(255,255,255,.12);box-shadow:0 10px 24px rgba(0,0,0,.22);backdrop-filter:blur(10px);padding:12px 18px;border-radius:16px;font-size:16px;font-weight:800}
#timer-container{font-size:3.2rem;font-weight:900;color:#00d4ff;padding:10px 68px;background:var(--panel-bg);border:4px solid #00d4ff;border-radius:60px;margin:18px 0 30px;box-shadow:0 0 30px #00d4ff;transition:all .3s}
@keyframes pulseWarn {0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.timer-warn{color:#ff4b2b!important;border-color:#ff4b2b!important;box-shadow:0 0 30px #ff4b2b!important;animation:pulseWarn .55s infinite}
.game-main{display:flex;align-items:center;justify-content:center;gap:28px;width:95%;max-width:1620px;margin-top:20px}
.hp-visual-container{position:relative;width:124px;height:540px}.hp-img-base{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain}.hp-bg{filter:brightness(.2);z-index:1}.hp-ghost{z-index:2;filter:brightness(2) saturate(0);transition:clip-path 1s ease-out;opacity:.5}.hp-fill{z-index:3;transition:clip-path .3s ease-out}.defending-bar{filter:drop-shadow(0 0 15px #00d4ff) brightness(1.2)!important}.hp-text{position:absolute;width:100%;text-align:center;font-size:1.9rem;font-weight:900;color:#fff;text-shadow:0 0 8px #000;z-index:10;transition:top .4s}
.side-panel{display:flex;align-items:center;gap:18px;background:var(--panel-bg);padding:28px 22px 20px;border-radius:35px;border:3px solid rgba(255,255,255,.05);transition:all .4s ease;min-width:390px;min-height:380px}.identity-badge{position:absolute;top:16px;padding:10px 16px;border-radius:16px;background:rgba(6,10,22,.95);border:1px solid rgba(255,255,255,.18);font-weight:900;font-size:16px;letter-spacing:1px;z-index:5}.identity-badge.my{right:18px;color:#7CFFB2;border-color:rgba(124,255,178,.45)}.identity-badge.enemy{left:18px;color:#FF8F8F;border-color:rgba(255,143,143,.45)}.side-panel-wrap{position:relative}.avatar{width:166px;height:298px;border-radius:24px;object-fit:cover;border:3px solid rgba(255,255,255,.2);filter:brightness(.4);transition:all .4s ease;flex:0 0 auto}.stunned-avatar{filter:sepia(1) hue-rotate(300deg) brightness(.6)!important;border-color:#ff00ff!important}.active-side-O .avatar{filter:brightness(1);border-color:#f6d26a;box-shadow:var(--glow-O)}.active-side-X .avatar{filter:brightness(1);border-color:#9a7bff;box-shadow:var(--glow-X)}
.faction-tag{display:inline-block;padding:6px 12px;border-radius:999px;font-weight:800;margin-bottom:12px}.light-tag{background:rgba(124,255,178,.12);border:1px solid rgba(124,255,178,.25);color:#a9ffd0}.dark-tag{background:rgba(180,140,255,.12);border:1px solid rgba(180,140,255,.25);color:#cdb5ff}.sp-readout,.buff-readout,.ult-readout{margin-top:10px;font-size:15px;color:rgba(255,255,255,.86)}.buff-readout{min-height:40px;line-height:1.35}.resource-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:10px;min-width:72px}.resource-tag{font-size:16px;font-weight:900;letter-spacing:2px}.resource-tag.sp{color:#a7d1ff}.resource-tag.ult{color:#ffd36d}.sp-column-vertical,.ult-column-vertical{display:flex;flex-direction:column-reverse;gap:14px}.sp-dot-wrap,.ult-dot-wrap{position:relative;width:56px;height:56px}.sp-dot-base,.sp-dot-fill,.ult-dot-base,.ult-dot-fill{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;border-radius:50%}.sp-dot-base{background-image:url('sp_off.png');opacity:.5}.sp-dot-fill{background-image:url('sp_on.png');box-shadow:0 0 15px rgba(96,173,255,.75)}.ult-dot-base{background-image:url('sp_off.png');opacity:.42;filter:hue-rotate(145deg) saturate(1.2)}.ult-dot-fill{background-image:url('sp_on.png');filter:hue-rotate(140deg) saturate(1.25) brightness(1.08);box-shadow:0 0 18px rgba(255,194,74,.72)}
.board-wrapper{position:relative}.board{display:grid;grid-template-columns:repeat(3,170px);grid-template-rows:repeat(3,170px);gap:20px;padding:30px;background:linear-gradient(180deg,rgba(10,14,31,.74),rgba(7,10,22,.88));border-radius:30px;border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(10px);box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 18px 34px rgba(0,0,0,.24)}.cell{position:relative;background:linear-gradient(180deg,rgba(3,5,12,.82),rgba(12,18,35,.82));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:5.6rem;font-weight:bold;cursor:pointer;transition:.2s;border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}.cell::before{content:"";position:absolute;inset:0;border-radius:18px;background:linear-gradient(135deg, rgba(103,232,255,.03), transparent 42%, transparent 65%, rgba(141,107,255,.03));pointer-events:none}.cell.O{color:#f6d26a;text-shadow:var(--glow-O)}.cell.X{color:#9a7bff;text-shadow:var(--glow-X)}@keyframes blinkWarn{from{opacity:1}to{opacity:.3;filter:brightness(2)}}.warning-cell{animation:blinkWarn .6s infinite alternate}
#win-line-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}.winning-line{stroke:var(--win-line-color);stroke-width:12;stroke-linecap:round;filter:drop-shadow(0 0 15px var(--win-line-color));stroke-dasharray:1000;stroke-dashoffset:1000;animation:drawLine .5s ease-out forwards}@keyframes drawLine{to{stroke-dashoffset:0}}
.skill-footer{margin-top:42px;display:flex;flex-direction:column;align-items:center;gap:14px;background:linear-gradient(180deg,rgba(10,14,31,.82),rgba(8,12,24,.94));padding:22px 48px 26px;border-radius:42px;border:1px solid rgba(255,255,255,.14);box-shadow:0 16px 30px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.04);width:min(1180px,84vw)}.usage-dots{display:flex;gap:12px;padding-bottom:2px}.u-dot{width:14px;height:14px;border-radius:50%;background:#333;transition:.3s;border:1px solid #555}.u-dot.fill{background:#00d4ff;box-shadow:0 0 10px #00d4ff;border-color:#fff}.skill-header-row{display:flex;align-items:center;gap:36px;width:100%}.skill-label{font-size:2rem;font-weight:bold;color:#77ecff;border-right:3px solid rgba(255,255,255,.16);padding-right:32px;letter-spacing:2px;text-shadow:0 0 14px rgba(103,232,255,.20);flex:0 0 auto}.skill-list{display:flex;gap:24px;justify-content:flex-start;flex:1}.s-btn{position:relative;width:188px;height:98px;border:none;border-radius:22px;cursor:not-allowed;background-size:cover;background-position:center;opacity:.4;filter:brightness(.6);transition:all .3s;overflow:hidden}.s-btn::before{content:"";position:absolute;inset:0;background:linear-gradient(115deg, transparent 30%, rgba(255,255,255,.18) 48%, transparent 66%);transform:translateX(-140%);transition:transform .6s ease;pointer-events:none}.s-btn.active:hover::before{transform:translateX(170%)}.s-btn.active{cursor:pointer;opacity:1;filter:brightness(1);transform:translateY(-5px);border:3px solid #00d4ff;box-shadow:0 0 20px rgba(0,212,255,.6)}.cost-tag{position:absolute;bottom:8px;right:15px;background:rgba(0,0,0,.6);padding:2px 8px;border-radius:10px;font-size:.9rem;color:#f6d26a;border:1px solid rgba(246,210,106,.4);pointer-events:none}.btn-atk{background-image:url('skill_atk.png')}.btn-def{background-image:url('skill_def.png')}.btn-hel{background-image:url('skill_hel.png')}.btn-stn{background-image:url('skill_stn.png')}.end-turn-wrap{display:flex;justify-content:center;width:100%;margin-top:8px}.end-turn-btn{min-width:320px;height:68px;border:none;border-radius:20px;background:linear-gradient(90deg,#247cff,#7b5cff);color:#fff;font-size:1.9rem;font-weight:900;box-shadow:0 12px 24px rgba(24,54,120,.32), inset 0 1px 0 rgba(255,255,255,.18)}
.float-text{position:absolute;width:100px;text-align:center;font-size:2.5rem;font-weight:900;z-index:100;pointer-events:none;animation:floatUp .8s ease-out forwards;text-shadow:0 0 10px rgba(0,0,0,.8)}@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(.8)}20%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:translateY(-80px) scale(1)}}@keyframes shake{0%{transform:translate(1px,1px) rotate(0deg)}20%{transform:translate(-3px,0) rotate(-1deg)}40%{transform:translate(3px,2px) rotate(1deg)}60%{transform:translate(-3px,1px) rotate(-1deg)}80%{transform:translate(3px,1px) rotate(1deg)}100%{transform:translate(1px,-2px) rotate(0deg)}}.shake-effect{animation:shake .3s cubic-bezier(.36,.07,.19,.97) both}
#resultOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(3,4,12,.66);backdrop-filter:blur(8px);z-index:10000}#resultOverlay.show{display:flex}.result-card{min-width:min(88vw,560px);padding:34px 32px;border-radius:28px;text-align:center;border:1px solid rgba(255,255,255,.18);box-shadow:0 24px 54px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.06)}.result-card.win{background:linear-gradient(135deg,rgba(246,210,106,.18),rgba(0,212,255,.16),rgba(0,0,0,.84));border-color:rgba(246,210,106,.45)}.result-card.lose{background:linear-gradient(135deg,rgba(90,40,130,.35),rgba(24,10,44,.88),rgba(0,0,0,.84));border-color:rgba(154,123,255,.35)}.result-title{font-size:4rem;font-weight:900;letter-spacing:6px;margin:0 0 10px}.result-card.win .result-title{color:#ffe37a;text-shadow:0 0 18px rgba(0,212,255,.45)}.result-card.lose .result-title{color:#c9a8ff;text-shadow:0 0 18px rgba(154,123,255,.35)}.result-sub{font-size:1.2rem;opacity:.92;margin-bottom:16px}.result-actions{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}.result-actions button{min-width:160px;height:48px;border:none;border-radius:14px;font-size:1.05rem;font-weight:900;cursor:pointer}#btnRematch{background:linear-gradient(90deg,#00c6ff,#0072ff);color:#fff}#btnBackMenu{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18)}
@media (max-width:1500px){body{overflow:auto}.game-main{transform:scale(.9);transform-origin:top center}.skill-footer{transform:scale(.92)}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div id="topbar"><div class="pill">房號：<strong id="roomCode">LOCAL</strong></div><div class="pill" id="turnText">目前回合：光 / O</div></div>
<div id="timer-container">30</div>
<div class="game-main" id="main-container">
  <div class="hp-visual-container" id="hp-box-O"><div id="hp-val-O" class="hp-text">100%</div><img src="left-hp-bar.png" class="hp-img-base hp-bg"><img src="left-hp-bar.png" id="hp-ghost-O" class="hp-img-base hp-ghost"><img src="left-hp-bar.png" id="hp-fill-O" class="hp-img-base hp-fill"></div>
  <div class="side-panel-wrap">
    <div class="side-panel active-side-O" id="panel-O">
      <img src="image_ba490a.png" class="avatar" id="avatar-O" alt="P1">
      <div class="resource-col ult-col"><div class="resource-tag ult">充能</div><div class="ult-column-vertical" id="ult-display-O"></div><div class="ult-readout" id="ult-text-O">ULT 0 / 100</div><div class="buff-readout" id="buff-text-O">直排：當下回復 8 HP</div></div>
      <div class="resource-col sp-col"><div class="identity-badge my" id="badge-O">光 / O</div><div class="sp-column-vertical" id="sp-display-O"></div><div class="sp-readout" id="sp-text-O">SP 0 / 100</div></div>
    </div>
  </div>
  <div class="board-wrapper"><svg id="win-line-canvas"></svg><div class="board" id="board"></div></div>
  <div class="side-panel-wrap">
    <div class="side-panel active-side-X" id="panel-X">
      <div class="resource-col sp-col"><div class="identity-badge enemy" id="badge-X">暗 / X</div><div class="sp-column-vertical" id="sp-display-X"></div><div class="sp-readout" id="sp-text-X">SP 0 / 100</div></div>
      <div class="resource-col ult-col"><div class="resource-tag ult">充能</div><div class="ult-column-vertical" id="ult-display-X"></div><div class="ult-readout" id="ult-text-X">ULT 0 / 100</div><div class="buff-readout" id="buff-text-X">直排增加傷害</div></div>
      <img src="image_ba4947.png" class="avatar" id="avatar-X" alt="P2">
    </div>
  </div>
  <div class="hp-visual-container" id="hp-box-X"><div id="hp-val-X" class="hp-text">100%</div><img src="right-hp-bar.png" class="hp-img-base hp-bg"><img src="right-hp-bar.png" id="hp-ghost-X" class="hp-img-base hp-ghost"><img src="right-hp-bar.png" id="hp-fill-X" class="hp-img-base hp-fill"></div>
</div>
<div class="skill-footer"><div class="usage-dots" id="usage-dots-container"></div><div class="skill-header-row"><div class="skill-label">戰技命令</div><div class="skill-list" id="skill-list-container"></div></div><div class="end-turn-wrap"><button class="end-turn-btn" id="endTurnBtn" type="button">結束這回合</button></div></div>
<div id="resultOverlay"><div id="resultCard" class="result-card win"><h1 id="resultTitle" class="result-title">勝利</h1><div id="resultSub" class="result-sub">本局已結束</div><div class="result-actions"><button id="btnRematch">重新遊玩</button><button id="btnBackMenu">返回菜單</button></div></div></div>
<div id="syncOverlay" style="position:fixed;inset:0;background:rgba(4,7,16,.74);display:flex;align-items:center;justify-content:center;z-index:1200;"><div style="padding:20px 28px;border-radius:18px;background:rgba(9,13,27,.92);border:1px solid rgba(255,255,255,.12);font-weight:800;letter-spacing:1px">同步中…</div></div>
<script type="module" src="game.js"></script>
</body></html>
